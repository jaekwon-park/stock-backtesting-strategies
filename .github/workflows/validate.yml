name: Validate Strategies

on:
  push:
    paths:
      - 'strategies/**'
  pull_request:
    paths:
      - 'strategies/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run strategy validation
        run: python scripts/validate_strategy.py
